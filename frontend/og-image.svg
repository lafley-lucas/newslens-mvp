<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 배경: 종이톤 + 우상단 보라 wash + 좌하단 옅은 amber wash (랜딩과 동일 톤) -->
  <defs>
    <radialGradient id="purple" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#534ab7" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#534ab7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#534ab7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber" cx="10%" cy="95%" r="50%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#fafaf7"/>
  <rect width="1200" height="630" fill="url(#purple)"/>
  <rect width="1200" height="630" fill="url(#amber)"/>

  <!-- 브랜드 -->
  <text x="80" y="120" font-family="Pretendard, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif"
        font-size="32" font-weight="600" fill="#0d0d0d" letter-spacing="-0.5">newslens</text>
  <text x="80" y="155" font-family="Pretendard, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#6b6b6b" letter-spacing="2">KOREAN NEWS MEDIA FILTER</text>

  <!-- 헤드라인 (3줄) -->
  <text x="80" y="290" font-family="Pretendard, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#0a0a0a" letter-spacing="-2">
    이 기사, 어디가 <tspan fill="#0a0a0a">사실</tspan>이고
  </text>
  <!-- '사실' 강조 박스 (파랑) -->
  <rect x="408" y="232" width="160" height="76" rx="6" fill="#2563eb" fill-opacity="0.18"/>
  <text x="80" y="290" font-family="Pretendard, -apple-system, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2" fill="transparent">
    이 기사, 어디가 <tspan fill="#1e40af">사실</tspan>이고
  </text>

  <text x="80" y="385" font-family="Pretendard, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#0a0a0a" letter-spacing="-2">
    어디가 <tspan>의견</tspan>인지
  </text>
  <!-- '의견' 강조 박스 (오렌지) -->
  <rect x="216" y="327" width="160" height="76" rx="6" fill="#ea580c" fill-opacity="0.18"/>
  <text x="80" y="385" font-family="Pretendard, -apple-system, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2" fill="transparent">
    어디가 <tspan fill="#9a3412">의견</tspan>인지
  </text>

  <text x="80" y="480" font-family="Pretendard, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#0a0a0a" letter-spacing="-2">색깔로 보여드립니다.</text>

  <!-- 하단 4 카테고리 dot legend -->
  <g transform="translate(80 560)" font-family="Pretendard, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#3d3d3d">
    <circle cx="10" cy="-6" r="10" fill="#2563eb"/>
    <text x="32" y="0">사실</text>
    <circle cx="130" cy="-6" r="10" fill="#0891b2"/>
    <text x="152" y="0">인용</text>
    <circle cx="250" cy="-6" r="10" fill="#ea580c"/>
    <text x="272" y="0">의견</text>
    <circle cx="370" cy="-6" r="10" fill="#1f2937"/>
    <text x="392" y="0">프레이밍</text>
  </g>

  <!-- 우하단 도메인 -->
  <text x="1120" y="595" text-anchor="end" font-family="Pretendard, -apple-system, sans-serif"
        font-size="18" font-weight="500" fill="#6b6b6b">newslens</text>
</svg>

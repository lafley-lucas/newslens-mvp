# Railway 배포 설정 — 백엔드만 (프론트는 GitHub Pages)
[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
buildContext = "backend"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.envs]
# Railway 대시보드 Variables 탭에서 직접 설정 (예시값 X)
# === 필수 ===
# - GEMINI_API_KEY
# - APP_ENV=production
# - CORS_ALLOW_ORIGINS  (예: https://lafley-lucas.github.io)
#
# === 선택 ===
# - GEMINI_MODEL              (기본 gemini-2.5-flash)
# - GEMINI_MODEL_FALLBACK     (기본 gemini-2.5-flash-lite)
# - RATE_LIMIT_PER_HOUR       (기본 20)
#
# === 기능 B (빠진 관점 분석) 활성화용 — 둘 다 설정해야 켜짐, 미설정 시 카드 자동 숨김 ===
# - GOOGLE_CSE_API_KEY
# - GOOGLE_CSE_ID
